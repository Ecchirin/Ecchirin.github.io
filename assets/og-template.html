<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; font-family: Georgia, serif; background: #faf7f2; color: #1a1612; }
    .canvas { width: 1200px; height: 630px; padding: 80px 100px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
    .label { font-family: 'Helvetica Neue', sans-serif; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; color: #8a7a65; }
    h1 { font-size: 60px; line-height: 1.1; font-weight: 400; margin: 24px 0 0; max-width: 980px; letter-spacing: -1px; }
    .arc { font-family: 'Helvetica Neue', sans-serif; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: #4a4039; }
    .arc .arrow { color: #b85a2b; padding: 0 14px; }
    .url { font-family: 'Helvetica Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: #4a4039; }
  </style>
</head>
<body>
  <div class="canvas">
    <div>
      <div class="label">Lim Zi Sheng &nbsp;&middot;&nbsp; Singapore &nbsp;&middot;&nbsp; Senior Engineer</div>
      <h1>An engineer who started at the metal, moved to financial infrastructure, and stayed curious.</h1>
    </div>
    <div>
      <div class="arc">
        C++ Game Servers <span class="arrow">&rarr;</span>
        Web3 Infrastructure <span class="arrow">&rarr;</span>
        AI&#8209;Augmented Engineering
      </div>
      <div class="url" style="margin-top: 18px;">Ecchirin.github.io</div>
    </div>
  </div>
</body>
</html>
